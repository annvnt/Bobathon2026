<text x="36" y="112" font-size="18" fill="#1A1917" text-anchor="start" font-weight="500" dominant-baseline="central" >Define what “critical” means for you</text>
<text x="36" y="134" font-size="11" fill="#888684" text-anchor="start" font-weight="400" dominant-baseline="central" >Regulatory Radar uses these rules to flag and prioritise gaps. A €50k fine may be existential for you, routine for others.</text>
<rect x="36" y="156" width="375" height="300" rx="6" fill="#FFFFFF" stroke="#E4E2DE" stroke-width="0.75"/>
<text x="52" y="178" font-size="12" fill="#1A1917" text-anchor="start" font-weight="500" dominant-baseline="central" >What makes a gap CRITICAL</text>
<text x="52" y="196" font-size="10" fill="#888684" text-anchor="start" font-weight="400" dominant-baseline="central" >Any of these elevates a gap to red</text>
<circle cx="58" cy="230" r="5" fill="#E24B4A"/>
<text x="72" y="230" font-size="11" fill="#3A3835" text-anchor="start" font-weight="400" dominant-baseline="central" >Risk of an EU market ban</text>
