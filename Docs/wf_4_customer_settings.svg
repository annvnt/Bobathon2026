<text x="662" y="730" font-size="11" fill="#555453" text-anchor="middle" font-weight="400" dominant-baseline="central" >Reset</text>
<rect x="712" y="716" width="92" height="28" rx="5" fill="#3A3835" stroke="none" stroke-width="0.75"/>
<text x="758" y="730" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="400" dominant-baseline="central" >Save</text>
<text x="36" y="776" font-size="10" fill="#AAAAAA" text-anchor="start" font-weight="400" dominant-baseline="central" font-style="italic">Defaults are sensible out of the box — this screen is optional. It lets each SME tune sensitivity to their own risk tolerance.</text>
