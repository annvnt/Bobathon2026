<circle cx="603" cy="574" r="7" fill="#FFFFFF" stroke="#3A3835" stroke-width="1"/><circle cx="603" cy="574" r="3.5" fill="#3A3835"/><text x="618" y="574" font-size="11" fill="#3A3835" text-anchor="start" font-weight="400" dominant-baseline="central" >Critical + upcoming</text>
<circle cx="753" cy="574" r="7" fill="#FFFFFF" stroke="#BEBCB8" stroke-width="1"/><text x="768" y="574" font-size="11" fill="#3A3835" text-anchor="start" font-weight="400" dominant-baseline="central" >Critical only</text>
