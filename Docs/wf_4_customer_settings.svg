<text x="465" y="360" font-size="11" fill="#3A3835" text-anchor="start" font-weight="500" dominant-baseline="central" >Schedule</text>
<text x="465" y="374" font-size="10" fill="#888684" text-anchor="start" font-weight="400" dominant-baseline="central" >Anything further out — track only</text>
<rect x="726" y="356" width="62" height="20" rx="4" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
<text x="757" y="366" font-size="9.5" fill="#888684" text-anchor="middle" font-weight="400" dominant-baseline="central" >auto</text>
