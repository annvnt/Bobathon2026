<text x="72" y="306" font-size="11" fill="#3A3835" text-anchor="start" font-weight="400" dominant-baseline="central" >Affects a consumer-facing product</text>
<rect x="357" y="298" width="38" height="20" rx="10" fill="#3A3835" stroke="none" stroke-width="0.75"/><circle cx="384.5" cy="308" r="7.5" fill="#FFFFFF"/>
<circle cx="58" cy="344" r="5" fill="#E24B4A"/>
<text x="72" y="344" font-size="11" fill="#3A3835" text-anchor="start" font-weight="400" dominant-baseline="central" >Affects a B2B / industrial product</text>
<rect x="357" y="336" width="38" height="20" rx="10" fill="#D3D1C7" stroke="none" stroke-width="0.75"/><circle cx="367.5" cy="346" r="7.5" fill="#FFFFFF"/>
<line x1="52" y1="380" x2="395" y2="380" stroke="#E4E2DE" stroke-width="0.75"/>
