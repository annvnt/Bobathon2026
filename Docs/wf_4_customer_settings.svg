<text x="166" y="431" font-size="10" fill="#888684" text-anchor="start" font-weight="400" dominant-baseline="central" >per market</text>
<rect x="429" y="156" width="375" height="300" rx="6" fill="#FFFFFF" stroke="#E4E2DE" stroke-width="0.75"/>
<text x="445" y="178" font-size="12" fill="#1A1917" text-anchor="start" font-weight="500" dominant-baseline="central" >When to act — urgency by deadline</text>
<text x="445" y="196" font-size="10" fill="#888684" text-anchor="start" font-weight="400" dominant-baseline="central" >How soon a deadline maps to each urgency level</text>
<circle cx="451" cy="228" r="5" fill="#E24B4A"/>
<text x="465" y="222" font-size="11" fill="#3A3835" text-anchor="start" font-weight="500" dominant-baseline="central" >Act now</text>
<text x="465" y="236" font-size="10" fill="#888684" text-anchor="start" font-weight="400" dominant-baseline="central" >Deadline passed / already violating</text>
<rect x="726" y="218" width="62" height="20" rx="4" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
<text x="757" y="228" font-size="9.5" fill="#888684" text-anchor="middle" font-weight="400" dominant-baseline="central" >fixed</text>
