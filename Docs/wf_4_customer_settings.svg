<circle cx="58" cy="268" r="5" fill="#E24B4A"/>
<text x="72" y="268" font-size="11" fill="#3A3835" text-anchor="start" font-weight="400" dominant-baseline="central" >Risk of marketplace delisting</text>
<rect x="357" y="260" width="38" height="20" rx="10" fill="#3A3835" stroke="none" stroke-width="0.75"/><circle cx="384.5" cy="270" r="7.5" fill="#FFFFFF"/>
