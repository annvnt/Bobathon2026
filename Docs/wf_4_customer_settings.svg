<text x="792" y="278" font-size="10" fill="#888684" text-anchor="end" font-weight="400" dominant-baseline="central" >days</text>
<circle cx="451" cy="320" r="5" fill="#E0A93B"/>
<text x="465" y="314" font-size="11" fill="#3A3835" text-anchor="start" font-weight="500" dominant-baseline="central" >Plan now</text>
<text x="465" y="328" font-size="10" fill="#888684" text-anchor="start" font-weight="400" dominant-baseline="central" >Deadline is within</text>
<rect x="692" y="311" width="96" height="26" rx="5" fill="#FFFFFF" stroke="#BEBCB8" stroke-width="0.75"/><text x="706" y="324" font-size="14" fill="#888684" text-anchor="start" font-weight="400" dominant-baseline="central" >–</text><text x="740" y="324" font-size="12" fill="#1A1917" text-anchor="middle" font-weight="500" dominant-baseline="central" >180</text><text x="774" y="324" font-size="13" fill="#888684" text-anchor="middle" font-weight="400" dominant-baseline="central" >+</text>
<text x="792" y="324" font-size="10" fill="#888684" text-anchor="end" font-weight="400" dominant-baseline="central" >days</text>
