<rect x="334.8" y="508" width="30.8" height="24" rx="12" fill="#3A3835" stroke="#3A3835" stroke-width="0.75"/><text x="350.2" y="520" font-size="10" fill="#FFFFFF" text-anchor="middle" font-weight="400" dominant-baseline="central" >DE</text>
<rect x="373.6" y="508" width="30.8" height="24" rx="12" fill="#3A3835" stroke="#3A3835" stroke-width="0.75"/><text x="389.0" y="520" font-size="10" fill="#FFFFFF" text-anchor="middle" font-weight="400" dominant-baseline="central" >FR</text>
<rect x="412.40000000000003" y="508" width="30.8" height="24" rx="12" fill="#F5F4F1" stroke="#BEBCB8" stroke-width="0.75"/><text x="427.8" y="520" font-size="10" fill="#3A3835" text-anchor="middle" font-weight="400" dominant-baseline="central" >US</text>
<rect x="451.20000000000005" y="508" width="30.8" height="24" rx="12" fill="#F5F4F1" stroke="#BEBCB8" stroke-width="0.75"/><text x="466.6" y="520" font-size="10" fill="#3A3835" text-anchor="middle" font-weight="400" dominant-baseline="central" >UK</text>
<text x="52" y="536" font-size="9.5" fill="#888684" text-anchor="start" font-weight="400" dominant-baseline="central" font-style="italic">Gaps for markets you don't sell in are excluded — no false alarms.</text>
<line x1="52" y1="552" x2="788" y2="552" stroke="#E4E2DE" stroke-width="0.75"/>
<text x="52" y="574" font-size="11" fill="#3A3835" text-anchor="start" font-weight="400" dominant-baseline="central" >Hide “Schedule”-level items from my dashboard</text>
